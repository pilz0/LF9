services:
  ftp_server:
    image: delfer/alpine-ftp-server
    container_name: ftp_server
    ports:
      - 21:21
      - 21000-21010:21000-21010
    volumes:
      # remember to replace /folder_on_disk/ with the path to where you want to store the files on the host machine
      - ./ftp1:/home/user1
      - ./ftp2:/home/user2
    environment:
      - ADRESS=ftp.local
      - USERS=user1|garlictomatofood|/home/user1|1000 user2|garlictomatofood|/home/user2|1002
    restart: always
    dns:
      - 10.13.12.69
    #    - fd69:acab:1312::69 # Issues with IPv6
    networks:
      default:
        ipv4_address: 10.13.12.116
  #        ipv6_address: fd69:acab:1312::116 # Issues with IPv6
  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: samba
    restart: unless-stopped
    environment:
      ACCOUNT_user1: garlictomatofood
      UID_user1: 1000
      ACCOUNT_user2: garlictomatofood
      UID_user2: 1002
      SAMBA_VOLUME_CONFIG_sharename: "[sharename]; path=/shares/location; available = yes; browsable = yes; writable = no; read only = yes; force user = username; public = yes; guest ok = yes"
    volumes:
      - /your/data:/shares/location
    ports:
      - 445:445

  vm_debian_1:
    image: ghcr.io/pilz0/berufsschule:master
    container_name: vm_debian_1
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    #    Uncomment to build the Image form source
    #    build:
    #      context: .
    #      dockerfile: ./Dockerfile-vm_debian
    ports:
      - 5901:5901
      - 6901:6901
    networks:
      default:
        ipv4_address: 10.13.12.55
        ipv6_address: fd69:acab:1312::55

  unbound:
    container_name: unbound
    image: "mvance/unbound:latest"
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    expose:
      - "53"
    volumes:
      - ./a-records.conf:/opt/unbound/etc/unbound/a-records.conf:ro
      - ./forward-records.conf:/opt/unbound/etc/unbound/forward-records.conf:ro
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 10.13.12.69
        ipv6_address: fd69:acab:1312::69

  mariadb:
    image: docker.io/bitnami/mariadb:11.4
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    volumes:
      - 'mariadb_data:/bitnami/mariadb'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_wordpress
      - MARIADB_DATABASE=bitnami_wordpress
    networks:
      default:
        ipv4_address: 10.13.12.50
        ipv6_address: fd69:acab:1312::50

  wordpress:
    image: docker.io/bitnami/wordpress-nginx:6
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    ports:
      - '80:8080'
      - '443:8443'
    volumes:
      - 'wordpress_data:/bitnami/wordpress'
    depends_on:
      - mariadb
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - WORDPRESS_DATABASE_HOST=mariadb.local
      - WORDPRESS_DATABASE_PORT_NUMBER=3306
      - WORDPRESS_DATABASE_USER=bn_wordpress
      - WORDPRESS_DATABASE_NAME=bitnami_wordpress
    networks:
      default:
        ipv4_address: 10.13.12.42
        ipv6_address: fd69:acab:1312::42

  grafana:
    image: grafana/grafana
    container_name: grafana
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./datasource_prometheus.yml:/etc/grafana/provisioning/datasources/datasource.yaml
      - ./dashboard_grafana.yml:/etc/grafana/provisioning/dashboards/dashboard.yaml
      - ./node_exporter_dashboard.json:/etc/grafana/provisioning/dashboards/node_exporter_dashboard.json
      - 'grafana_storage:/var/lib/grafana'
    networks:
      default:
        ipv4_address: 10.13.12.99
        ipv6_address: fd69:acab:1312::99

  prometheus:
    image: prom/prometheus
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      default:
        ipv4_address: 10.13.12.98
        ipv6_address: fd69:acab:1312::98

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - 9100
    networks:
      default:
        ipv4_address: 10.13.12.97
        ipv6_address: fd69:acab:1312::97

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wiki
      POSTGRES_PASSWORD: wikijsrocks
      POSTGRES_USER: wikijs
    logging:
      driver: "none"
    restart: unless-stopped
    volumes:
      - ./wiki_data:/var/lib/postgresql/data
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    networks:
      default:
        ipv4_address: 10.13.12.96
        ipv6_address: fd69:acab:1312::96

  wiki:
    image: ghcr.io/requarks/wiki:2
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: wikijs
      DB_PASS: wikijsrocks
      DB_NAME: wiki
    restart: unless-stopped
    ports:
      - "3080:3000"
    dns:
      - 10.13.12.69
      - fd69:acab:1312::69
    networks:
      default:
        ipv4_address: 10.13.12.75
        ipv6_address: fd69:acab:1312::75

volumes:
  grafana_storage: {}
  mariadb_data:
    driver: local
  wordpress_data:
    driver: local

networks:
  default:
    enable_ipv6: true
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.13.12.0/24
        - subnet: fd69:acab:1312::/64
